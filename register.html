<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Akun</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:90%;
    max-width:400px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#ee4d2d;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.login-link{
    text-align:center;
    margin-top:15px;
}

.login-link a{
    color:#ee4d2d;
    text-decoration:none;
}
</style>

</head>
<body>

<div class="card">

<h2>Daftar Akun</h2>

<input
type="text"
id="name"
placeholder="Nama Lengkap">

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="registerBtn">
Daftar
</button>

<div class="login-link">
    Sudah punya akun?
    <a href="login.html">
        Login
    </a>
</div>

</div>

<script type="module" src="js/register.js"></script>

</body>
</html>
